name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Create tarball
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          tar -czf "openai-cli-v${VERSION}.tar.gz" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openai-cli-v*.tar.gz
          generate_release_notes: true

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
